[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo_mysql", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.zip", "php83Extensions.gd", "php83Extensions.curl", "composer", "nodejs_20", "npm-9_x"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm ci",
    "npm run build"
]

[phases.deploy]
cmds = [
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan migrate --force --seed"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"